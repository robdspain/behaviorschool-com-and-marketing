[build]
  command = "rm -rf .next tsconfig.tsbuildinfo && pnpm install --no-frozen-lockfile --prod=false && NODE_ENV=production pnpm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "9.15.0"
  ENABLE_EXPERIMENTAL_COREPACK = "1"
  NPM_FLAGS = "--prefer-offline --no-audit"
  PNPM_FLAGS = "--no-frozen-lockfile"
  NODE_OPTIONS = "--max-old-space-size=6144"
  SECRETS_SCAN_ENABLED = "false"
  NEXT_PUBLIC_SUPABASE_URL = "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "placeholder_anon_key"
  NEXT_PUBLIC_CONVEX_URL = "https://quixotic-fox-157.convex.cloud"

[functions]
  node_bundler = "esbuild"

# Next.js plugin for proper SSR/API route support
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Auto-submit sitemap to search engines after successful publish
[[plugins]]
  package = "netlify-plugin-submit-sitemap"
  [plugins.inputs]
    baseUrl = "https://behaviorschool.com"
    sitemapPath = "/sitemap.xml"
    providers = ["google", "bing"]

# Next.js handles routing, only redirect specific cases
[[redirects]]
  from = "/www/*"
  to = "/:splat"
  status = 301
  force = true

# Handle old URLs if any
[[redirects]]
  from = "/old-page"
  to = "/"
  status = 301

# Redirect supervision to supervisors
[[redirects]]
  from = "/supervision"
  to = "/supervisors"
  status = 301

# Transformation Program nurture sequence processor - every hour
[functions."transformation-nurture-worker"]
  schedule = "12 * * * *"

# Fallback trigger to refresh salary data yearly (and ensure site rebuild)

# Weekly revenue summary — every Monday at 8 AM ET (13:00 UTC)
[functions."weekly-revenue-summary"]
  schedule = "0 13 * * 1"

# Behavior Study Tools trend research - daily before the growth report
[functions."bst-trend-research"]
  schedule = "45 12 * * *"

# Behavior Study Tools SEO metrics - daily before trends and growth report
[functions."bst-seo-metrics"]
  schedule = "30 12 * * *"

# Behavior Study Tools SEO action queue - daily after SEO metrics
[functions."bst-seo-action-generator"]
  schedule = "40 12 * * *"

# Behavior Study Tools SEO content drafts - daily after action queue
[functions."bst-seo-draft-generator"]
  schedule = "42 12 * * *"

# Behavior Study Tools growth monitor - daily at 6 AM PT / 9 AM ET (13:00 UTC)
[functions."bst-daily-growth-monitor"]
  schedule = "0 13 * * *"

# Behavior Study Tools social publisher - daily after growth report
[functions."bst-social-publisher"]
  schedule = "15 13 * * *"

# Behavior Study Tools social feedback refresh - daily after publisher
[functions."bst-social-feedback-refresh"]
  schedule = "30 13 * * *"
