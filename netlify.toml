[build]
  command = "rm -rf .next tsconfig.tsbuildinfo && pnpm install --no-frozen-lockfile --prod=false && NODE_ENV=production pnpm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "9.15.0"
  ENABLE_EXPERIMENTAL_COREPACK = "1"
  NPM_FLAGS = "--prefer-offline --no-audit"
  PNPM_FLAGS = "--no-frozen-lockfile"
  NODE_OPTIONS = "--max-old-space-size=3072"
  SECRETS_SCAN_ENABLED = "false"
  NEXT_PUBLIC_SUPABASE_URL = "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "placeholder_anon_key"

[functions]
  node_bundler = "esbuild"

# Next.js plugin for proper SSR/API route support
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Auto-submit sitemap to search engines after successful publish
[[plugins]]
  package = "netlify-plugin-submit-sitemap"
  [plugins.inputs]
    baseUrl = "https://behaviorschool.com"
    sitemapPath = "/sitemap.xml"
    providers = ["google", "bing"]

# Next.js handles routing, only redirect specific cases
[[redirects]]
  from = "/www/*"
  to = "/:splat"
  status = 301
  force = true

# Handle old URLs if any
[[redirects]]
  from = "/old-page"
  to = "/"
  status = 301

# Redirect supervision to supervisors
[[redirects]]
  from = "/supervision"
  to = "/supervisors"
  status = 301

# Schedule newsletter worker every 5 minutes

# Fallback trigger to refresh salary data yearly (and ensure site rebuild)

# Weekly revenue summary — every Monday at 8 AM ET (13:00 UTC)
[[scheduled.functions]]
  name = "weekly-revenue-summary"
  cron = "0 13 * * 1"
