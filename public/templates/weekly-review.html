<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weekly Review</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root { --ink:#0f172a; --muted:#475569; --line:#e2e8f0; --accent:#1f4d3f; --accent-soft:#ecf4f1; --bg:#f8fafc; }
      * { box-sizing: border-box; }
      html, body { margin:0; padding:0; }
      body { font-family: "IBM Plex Sans", system-ui, -apple-system, Segoe UI, Arial, sans-serif; color: var(--ink); background: var(--bg); }
      .wrap { max-width: 980px; margin: 28px auto; padding: 0 18px 32px; }
      .hero { display:grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; align-items:end; background:white; border:1px solid var(--line); border-radius:16px; padding:18px 20px; }
      h1 { font-family: "Fraunces", serif; font-size:28px; margin:0 0 6px; }
      .sub { color:var(--muted); font-size:14px; margin:0; }
      .meta { display:flex; gap:10px; flex-wrap:wrap; font-size:12px; color:var(--muted); }
      .meta span { background: var(--accent-soft); color: var(--accent); padding: 4px 8px; border-radius:999px; font-weight:600; }
      .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:14px; }
      .card { background:white; border:1px solid var(--line); border-radius:14px; padding:16px 18px; }
      .section-title { font-size:13px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:var(--accent); margin:0 0 10px; }
      label { display:block; font-weight:600; font-size:13px; margin-bottom:6px; }
      input[type="text"], textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; background:white; }
      textarea { resize: vertical; min-height: 90px; }
      .row { margin-bottom: 12px; }
      .two-col { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
      .btn { appearance:none; border:0; background:var(--accent); color:white; font-weight:700; padding:10px 16px; border-radius:10px; cursor:pointer; }
      .footer { margin-top:18px; padding-top:14px; border-top:1px solid var(--line); color:var(--muted); font-size:12px; display:flex; flex-wrap:wrap; gap:12px 18px; }
      .footer a { color: var(--accent); text-decoration:none; font-weight:600; }
      @media (max-width: 860px){ .hero{grid-template-columns:1fr;} .grid, .two-col{grid-template-columns:1fr;} }
      @media print { body{background:white;} .noprint{display:none!important;} .wrap{margin:0.5in; padding:0;} .card{break-inside:avoid;} }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <div>
          <h1>Weekly Review</h1>
          <p class="sub">A short weekly reflection to keep goals, data, and supports aligned.</p>
        </div>
        <div class="meta">
          <span>Weekly routine</span>
          <span>Data‑aligned</span>
          <span>Print‑ready</span>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <p class="section-title">Summary</p>
          <div class="row two-col">
            <div><label>Student</label><input type="text" placeholder="Student" /></div>
            <div><label>Week of</label><input type="text" placeholder="MM/DD/YYYY" /></div>
          </div>
          <div class="row">
            <label>Primary goal</label>
            <textarea placeholder="What was the focus this week?"></textarea>
          </div>
        </div>
        <div class="card">
          <p class="section-title">Data Snapshot</p>
          <div class="row">
            <label>Progress highlights</label>
            <textarea placeholder="Evidence of improvement or wins"></textarea>
          </div>
          <div class="row">
            <label>Concerns or dips</label>
            <textarea placeholder="Any areas that slipped or need attention"></textarea>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <p class="section-title">Supports</p>
          <div class="row">
            <label>Supports that worked</label>
            <textarea placeholder="Prompts, visuals, breaks, reinforcement"></textarea>
          </div>
          <div class="row">
            <label>Supports to change</label>
            <textarea placeholder="What needs to be adjusted?"></textarea>
          </div>
        </div>
        <div class="card">
          <p class="section-title">Next Week</p>
          <div class="row">
            <label>Next steps</label>
            <textarea placeholder="Plan for next week"></textarea>
          </div>
          <div class="row">
            <label>Who needs to know?</label>
            <input type="text" placeholder="Teacher, caregiver, team" />
          </div>
        </div>
      </div>

      <div class="noprint" style="margin-top: 14px; display:flex; gap:10px; align-items:center;">
        <button class="btn" onclick="window.print()">Print</button>
      </div>

      <div class="footer noprint">
        <span>More resources:</span>
        <a href="https://behaviorschool.com">Home</a>
        <a href="https://behaviorschool.com/resources">Resources</a>
        <a href="https://behaviorschool.com/templates">All Templates</a>
      </div>
    </div>
  </body>
</html>
